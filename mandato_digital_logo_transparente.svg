<svg xmlns="http://www.w3.org/2000/svg" width="2139" height="735" viewBox="0 0 2139 735" role="img" aria-labelledby="title desc">
  <title id="title">MandatoDigital logo</title>
  <desc id="desc">Logo MandatoDigital com fundo transparente, Mandato em verde, Digital em cinza, elementos digitais brancos e .ia.br em branco.</desc>
  <defs>
    <linearGradient id="greenText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6fb66a"/>
      <stop offset="0.55" stop-color="#3f943f"/>
      <stop offset="1" stop-color="#2f7f36"/>
    </linearGradient>
    <linearGradient id="silverText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b8c4cf"/>
      <stop offset="0.55" stop-color="#7f8e9d"/>
      <stop offset="1" stop-color="#5f6f7f"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <filter id="lightShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <style>
      .brand { font-family: Montserrat, Poppins, Arial, Helvetica, sans-serif; font-weight: 800; letter-spacing: -10px; }
      .sub { font-family: Montserrat, Poppins, Arial, Helvetica, sans-serif; font-weight: 800; }
      .white { fill: #ffffff; stroke: #ffffff; }
      .iconStroke { fill: none; stroke: #ffffff; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .square { fill: #ffffff; opacity: .96; }
    </style>
  </defs>

  <!-- Main wordmark -->
  <g filter="url(#softShadow)">
    <text class="brand" x="38" y="556" font-size="252" fill="url(#greenText)">Mandato</text>
    <text class="brand" x="1210" y="556" font-size="252" fill="url(#silverText)">Digital</text>
  </g>

  <!-- White civic / digital communication graphic -->
  <g filter="url(#lightShadow)" opacity="0.98">
    <!-- central flowing swoosh -->
    <path d="M1043 505 C1070 430, 1101 379, 1162 329 C1239 266, 1322 215, 1482 187 C1514 181, 1531 205, 1507 222 C1444 266, 1372 290, 1308 322 C1235 359, 1182 418, 1136 475 C1102 518, 1068 526, 1043 505 Z" fill="#ffffff"/>
    <path d="M1114 395 C1091 420, 1070 454, 1051 489" class="iconStroke" stroke-width="16"/>
    <path d="M1154 397 C1135 426, 1119 460, 1092 489" class="iconStroke" stroke-width="16"/>
    <path d="M1221 184 C1286 139, 1363 103, 1473 90 C1509 86, 1516 120, 1484 131 C1403 158, 1334 184, 1274 224 Z" fill="#ffffff"/>
    <path d="M1516 202 C1561 196, 1614 206, 1683 226 C1724 238, 1746 236, 1765 211 C1785 184, 1818 209, 1790 242 C1759 279, 1706 287, 1643 268 C1595 254, 1550 232, 1516 202 Z" fill="#ffffff"/>
  </g>

  <!-- Megaphone outline -->
  <g transform="translate(930 170) rotate(-18)" filter="url(#lightShadow)">
    <path class="iconStroke" d="M0 73 L52 28 L103 28 L103 118 L52 118 Z"/>
    <path class="iconStroke" d="M103 37 C133 52,133 94,103 109"/>
    <path class="iconStroke" d="M28 101 L51 158 L75 150 L54 98"/>
    <path class="iconStroke" d="M6 68 C-23 77,-18 120,13 126"/>
  </g>

  <!-- floating pixels and media icons -->
  <g filter="url(#lightShadow)">
    <rect class="square" x="1074" y="112" width="18" height="18" rx="4"/>
    <rect class="square" x="1115" y="82" width="34" height="34" rx="7"/>
    <rect class="square" x="1090" y="155" width="17" height="17" rx="4"/>
    <rect class="square" x="1130" y="164" width="20" height="20" rx="4"/>
    <rect class="square" x="1162" y="198" width="20" height="20" rx="4"/>
    <rect class="square" x="1142" y="230" width="19" height="19" rx="4"/>
    <path d="M1152 124 L1198 145 L1182 198 L1136 176 Z" fill="#ffffff"/>
    <path d="M1188 146 L1175 152 L1189 157 Z" fill="#dfe5ea"/>

    <rect class="square" x="1555" y="108" width="21" height="21" rx="4"/>
    <rect class="square" x="1590" y="126" width="23" height="23" rx="5"/>
    <rect class="square" x="1549" y="188" width="43" height="43" rx="9"/>
    <rect class="square" x="1631" y="261" width="25" height="25" rx="6"/>
    <rect class="square" x="1614" y="189" width="18" height="18" rx="4"/>

    <!-- document icon -->
    <g transform="translate(1655 83) rotate(14)">
      <path d="M0 0 H68 L93 25 V113 H0 Z" fill="#ffffff"/>
      <path d="M68 0 V28 H94" fill="#dfe5ea"/>
      <rect x="20" y="45" width="49" height="7" rx="3" fill="#687989"/>
      <rect x="20" y="63" width="43" height="7" rx="3" fill="#687989"/>
      <rect x="20" y="81" width="53" height="7" rx="3" fill="#687989"/>
    </g>

    <rect class="square" x="1784" y="68" width="62" height="62" rx="10"/>
    <rect class="square" x="1818" y="156" width="31" height="31" rx="6"/>

    <!-- image icon -->
    <g transform="translate(1877 81) rotate(11)">
      <rect x="0" y="0" width="88" height="88" rx="10" fill="#ffffff"/>
      <circle cx="65" cy="21" r="8" fill="#9aa8b6"/>
      <path d="M13 70 L35 42 L51 60 L63 48 L79 70 Z" fill="#667789"/>
    </g>
  </g>

  <!-- suffix -->
  <text class="sub" x="1762" y="652" font-size="118" fill="#ffffff" filter="url(#softShadow)">.ia.br</text>
</svg>
